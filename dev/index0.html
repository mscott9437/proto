<!doctype html>
<html lang="en" class="no-js"><head>

	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<meta name="description" content="realmode.llc">
	<title>Real&nbsp;Mode,&nbsp;LLC</title>
	<link rel="icon" type="image/svg+xml" href="/assets/realmode.llc/favicon.svg">
	<script type="module" src="/bundle.js"></script>

</head><body>

	<hr>

	<client-brand>

	<h1 slot="id">Real&nbsp;Mode,&nbsp;LLC</h1>

</client-brand>

<template id="client-brand">

	<style>

		.ctr {
		  display: flex;
		  justify-content: center;
		  height: 10em;
		  background-image: linear-gradient(gray, gray);
		}

		.animate {
		  align-self: center;
		  text-align: center;
		  color: white;
		  background-color: rgba(112, 128, 144, 0.95);
		  animation-duration: 3s;
		  animation-name: slidein;
		}

		@keyframes slidein {
		  from {
			 margin-left: 50%;
		  }
		  to {
			 margin-left: 0%;
		  }
		}

	</style>

	<div class="ctr"><div class="animate">

		<slot name="id"></slot>

	</div></div>

</template>
	<hr>

	<style>

	form[is="contact-form"] {
	  display: flex;
	  flex-direction: column;
	  font-weight: bold;
	}

	form[is="contact-form"] input, form[is="contact-form"] textarea {
	  width: 35%;
	  margin: 3px;
	}

	form[is="contact-form"] input[type=file] {
	  margin: 7px;
	}

	form[is="contact-form"] button {
	  border: 0;
	  width: 20%;
	  background-color: rgba(112, 128, 144, 0.95);
	  color: #fff;
	  font-weight: inherit;
	  margin: 7px 0 7px 0;
	}

</style>

<form is="contact-form" method="get" accept-charset="utf-8" action="javascript:alert('okay')" aria-label="">

	<label for="form-0">Form-0</label>
	<input id="form-0" name="form-0" type="text">

	<label for="form-1">Form-1</label>
	<input id="form-1" name="form-1" type="text">

	<label for="form-2">Form-2</label>
	<textarea id="form-2" name="form-2"></textarea>

	<label for="form-3">Form-3</label>
	<input id="form-3" name="form-3" type="file">

	<button type="submit">$</button>

</form>
	<hr>

	<canvas is="canvas-area" width="100" height="100">canvas</canvas>
	<noscript>NOSCRIPT</noscript>

	<hr>

	<a href="http://localhost:8888" target="_blank">http://localhost:8888</a>

	<hr>

	<a href="https://real.mode" target="_blank">https://real.mode</a>

	<input type="hidden" is="user-info">
	<scroll-buffer>

	<span class="scroll-buffer" slot="id">0</span>

</scroll-buffer>

<template id="scroll-buffer">

	<style>

		.ctr {
		  color: white;
		  background-color: black;
		  position: fixed;
		  bottom: 0;
		  right: 0;
		}

	</style>

	<div class="ctr">

		<slot name="id"></slot>

	</div>

</template>
</body></html>
